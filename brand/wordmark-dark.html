<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Prism wordmark — dark</title>
<style>
  /* Geist Black (900) is the target. Falls back to system sans for unstyled preview. */
  html, body {
    margin: 0; padding: 0;
    background: #0A0A0B;
    height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }
  .stage {
    width: min(720px, 90vw);
    aspect-ratio: 360 / 96;
    position: relative;
    color: #FAFAF9;
    isolation: isolate;
  }
  .stage > span {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: flex-start;
    padding-left: 5.5%;
    font-weight: 900;
    font-size: clamp(64px, 17.7vw, 144px);
    letter-spacing: -0.04em;
    line-height: 1;
  }
  .ghost-m { color: #FF1F8E; opacity: 0.55; transform: translateX(-2px); mix-blend-mode: screen; }
  .ghost-c { color: #1FE6FF; opacity: 0.55; transform: translateX(2px);  mix-blend-mode: screen; }
  .top     { color: #FAFAF9; mix-blend-mode: screen; }
</style>
</head>
<body>
<div class="stage" role="img" aria-label="prism wordmark">
  <span class="ghost-m" aria-hidden="true">prism</span>
  <span class="ghost-c" aria-hidden="true">prism</span>
  <span class="top">prism</span>
</div>
</body>
</html>
